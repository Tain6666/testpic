<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสอบออนไลน์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; }
        .hidden { display: none !important; }
        .timer-circle {
            width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: bold;
            border: 4px solid #3b82f6; color: #3b82f6;
        }
        .timer-warning { border-color: #ef4444; color: #ef4444; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzVDqR_x-T6IfTphgt3jNP6eqNOppCwVwYMoMm1y-f-Mmfb-wm31yHh3uwqSyywuf7E/exec";
    </script>

    <div id="app-container" class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden p-6 relative">
        
        <div id="page-auth">
            <div class="flex mb-6 border-b">
                <button id="tab-login" onclick="switchTab('login')" class="w-1/2 py-2 font-bold text-blue-600 border-b-2 border-blue-600 transition">เข้าสู่ระบบ</button>
                <button id="tab-register" onclick="switchTab('register')" class="w-1/2 py-2 font-bold text-gray-400 border-b-2 border-transparent hover:text-blue-500 transition">ลงทะเบียนใหม่</button>
            </div>
            
            <div id="form-login" class="space-y-4">
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">เบอร์โทรศัพท์</label>
                    <input type="tel" id="login-phone" maxlength="10" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="0xxxxxxxxx (เฉพาะผู้ที่ลงทะเบียนแล้ว)">
                </div>
                <button onclick="doLogin()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">เข้าสู่ระบบ</button>
            </div>

            <div id="form-register" class="space-y-4 hidden">
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">ชื่อ - นามสกุล</label>
                    <input type="text" id="reg-name" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="ระบุชื่อของคุณ">
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">เบอร์โทรศัพท์</label>
                    <input type="tel" id="reg-phone" maxlength="10" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="0xxxxxxxxx">
                </div>
                <button onclick="doRegister()" class="w-full bg-green-500 text-white font-bold py-3 rounded-lg hover:bg-green-600 transition">ลงทะเบียน</button>
            </div>
        </div>

        <div id="page-dashboard" class="hidden text-center">
            <h2 class="text-xl font-bold text-gray-800 mb-2">ยินดีต้อนรับ</h2>
            <p id="user-info" class="text-gray-600 mb-6"></p>
            
            <button id="btn-start" onclick="startTest()" class="w-full bg-green-500 text-white font-bold py-3 rounded-lg hover:bg-green-600 transition mb-3">เริ่มทำข้อสอบ</button>
            <button id="btn-check-score" onclick="showMyScore()" class="w-full bg-blue-100 text-blue-700 font-bold py-3 rounded-lg hover:bg-blue-200 transition mb-3 hidden">ดูคะแนนล่าสุด</button>
            
            <hr class="my-4 border-gray-200">
            <button onclick="logout()" class="w-full text-red-500 font-bold py-2 hover:bg-red-50 rounded-lg transition">ออกจากระบบ</button>
        </div>

        <div id="page-quiz" class="hidden">
            <div class="flex justify-between items-center mb-4">
                <span id="q-counter" class="text-gray-500 font-semibold">ข้อที่ 1/30</span>
                <div id="timer" class="timer-circle">15</div>
            </div>
            
            <div id="q-image-container" class="mb-4 hidden">
                <img id="q-image" src="" class="w-full h-48 object-contain bg-gray-100 rounded-xl border">
            </div>

            <h3 id="q-text" class="text-lg font-bold text-gray-800 mb-4 leading-relaxed"></h3>
            <div id="choices-container" class="space-y-3"></div>
        </div>

        <div id="page-result" class="hidden text-center">
            <div class="text-5xl mb-4">🎉</div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">ทำข้อสอบเสร็จสิ้น!</h2>
            <p id="result-name" class="text-gray-600 mb-2"></p>
            <div class="bg-blue-50 text-blue-800 font-bold text-4xl py-6 rounded-xl my-4">
                <span id="result-score">0</span> / 30
            </div>
            <button onclick="checkUserStatus()" class="w-full bg-gray-800 text-white font-bold py-3 rounded-lg hover:bg-gray-900 transition mb-3">กลับหน้าหลัก</button>
            <button onclick="logout()" class="w-full text-red-500 font-bold py-2 hover:bg-red-50 rounded-lg transition">ออกจากระบบ</button>
        </div>

    </div>

    <button onclick="openLeaderboard()" class="mt-8 text-gray-400 text-sm hover:text-gray-600 underline">ตรวจสอบอันดับ (แอดมิน)</button>

    <script>
        let user = { name: '', phone: '', score: 0 };
        let questions = [];
        let currentQIndex = 0;
        let score = 0;
        let timerInterval;
        let timeLeft = 15;

        async function fetchGAS(action, data = {}) {
            data.action = action;
            const params = new URLSearchParams(data);
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST', body: params,
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                });
                return await response.json();
            } catch (err) {
                Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
                return null;
            }
        }

        // ระบบเปลี่ยน Tab ลงทะเบียน/เข้าสู่ระบบ
        function switchTab(tab) {
            const btnLogin = document.getElementById('tab-login');
            const btnReg = document.getElementById('tab-register');
            const formLogin = document.getElementById('form-login');
            const formReg = document.getElementById('form-register');

            if (tab === 'login') {
                btnLogin.className = "w-1/2 py-2 font-bold text-blue-600 border-b-2 border-blue-600 transition";
                btnReg.className = "w-1/2 py-2 font-bold text-gray-400 border-b-2 border-transparent hover:text-blue-500 transition";
                formLogin.classList.remove('hidden');
                formReg.classList.add('hidden');
            } else {
                btnReg.className = "w-1/2 py-2 font-bold text-blue-600 border-b-2 border-blue-600 transition";
                btnLogin.className = "w-1/2 py-2 font-bold text-gray-400 border-b-2 border-transparent hover:text-blue-500 transition";
                formReg.classList.remove('hidden');
                formLogin.classList.add('hidden');
            }
        }

        function showPage(pageId) {
            ['page-auth', 'page-dashboard', 'page-quiz', 'page-result'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(pageId).classList.remove('hidden');
        }

        window.onload = () => {
            const savedUser = localStorage.getItem('quizUser');
            if (savedUser) {
                user = JSON.parse(savedUser);
                checkUserStatus();
            } else {
                showPage('page-auth');
            }
        };

        async function doRegister() {
            const name = document.getElementById('reg-name').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();
            if (!name || !phone) return Swal.fire('แจ้งเตือน', 'กรุณากรอกข้อมูลให้ครบ', 'warning');
            if (!/^0\d{9}$/.test(phone)) return Swal.fire('แจ้งเตือน', 'เบอร์โทรต้องมี 10 หลัก', 'warning');

            Swal.fire({ title: 'กำลังลงทะเบียน...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            const res = await fetchGAS('register', { name, phone });
            
            if (res && res.status === 'success') {
                user = { name, phone };
                localStorage.setItem('quizUser', JSON.stringify(user));
                checkUserStatus(); // พาเข้าหน้าหลักอัตโนมัติ
            } else if (res) {
                Swal.fire('เกิดข้อผิดพลาด', res.message, 'error');
            }
        }

        async function doLogin() {
            const phone = document.getElementById('login-phone').value.trim();
            if (!/^0\d{9}$/.test(phone)) return Swal.fire('แจ้งเตือน', 'เบอร์โทรไม่ถูกต้อง', 'warning');

            Swal.fire({ title: 'กำลังเข้าสู่ระบบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            const res = await fetchGAS('loginUser', { phone });
            
            if (res && res.status === 'success') {
                user = { name: res.name, phone: res.phone };
                localStorage.setItem('quizUser', JSON.stringify(user));
                handleDashboardRouting(res);
                Swal.close();
            } else if (res) {
                Swal.fire('เข้าสู่ระบบไม่ได้', res.message, 'error');
            }
        }

        // ตรวจสอบสถานะว่าเคยทำข้อสอบหรือยัง (เวลาโหลดหน้าใหม่)
        async function checkUserStatus() {
            if(!user.phone) return;
            Swal.fire({ title: 'กำลังโหลดข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            const res = await fetchGAS('loginUser', { phone: user.phone });
            if (res && res.status === 'success') {
                user.name = res.name; // อัปเดตชื่อเผื่อมีการเปลี่ยน
                handleDashboardRouting(res);
                Swal.close();
            } else {
                logout(); // เบอร์อาจถูกลบจากชีต
                Swal.fire('ผิดพลาด', 'ไม่พบประวัติผู้ใช้ กรุณาเข้าสู่ระบบใหม่', 'error');
            }
        }

        // ประมวลผลหน้า Dashboard ตามเงื่อนไข (ทำซ้ำได้/ไม่ได้)
        function handleDashboardRouting(data) {
            document.getElementById('user-info').innerText = `${data.name} (${data.phone})`;
            user.score = data.score;

            const btnStart = document.getElementById('btn-start');
            const btnScore = document.getElementById('btn-check-score');

            if (data.isCompleted) {
                btnScore.classList.remove('hidden'); // โชว์ปุ่มดูคะแนนเสมอถ้าเคยทำ
                
                if (data.allowRetake) {
                    btnStart.innerText = "ทำข้อสอบอีกครั้ง";
                    btnStart.classList.remove('hidden');
                } else {
                    btnStart.classList.add('hidden'); // ปิดปุ่มทำข้อสอบถ้าไม่อนุญาต
                }
            } else {
                // ยังไม่เคยทำ
                btnStart.innerText = "เริ่มทำข้อสอบ";
                btnStart.classList.remove('hidden');
                btnScore.classList.add('hidden');
            }
            
            showPage('page-dashboard');
        }

        function logout() {
            localStorage.removeItem('quizUser');
            user = { name: '', phone: '', score: 0 };
            document.getElementById('login-phone').value = '';
            document.getElementById('reg-name').value = '';
            document.getElementById('reg-phone').value = '';
            switchTab('login');
            showPage('page-auth');
        }

        function showMyScore() {
            document.getElementById('result-name').innerText = `${user.name} (${user.phone})`;
            document.getElementById('result-score').innerText = user.score;
            showPage('page-result');
        }

        async function startTest() {
            Swal.fire({ title: 'กำลังโหลดข้อสอบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            const res = await fetchGAS('getQuestions');
            if (res && res.status === 'success') {
                questions = res.data;
                currentQIndex = 0;
                score = 0;
                Swal.close();
                showPage('page-quiz');
                renderQuestion();
            }
        }

        function renderQuestion() {
            if (currentQIndex >= questions.length) {
                finishTest();
                return;
            }

            const q = questions[currentQIndex];
            document.getElementById('q-counter').innerText = `ข้อที่ ${currentQIndex + 1}/${questions.length}`;
            document.getElementById('q-text').innerText = q.question;
            
            const imgContainer = document.getElementById('q-image-container');
            const imgEl = document.getElementById('q-image');
            if (q.image && q.image.trim() !== '') {
                imgEl.src = q.image;
                imgContainer.classList.remove('hidden');
            } else {
                imgEl.src = '';
                imgContainer.classList.add('hidden');
            }
            
            const container = document.getElementById('choices-container');
            container.innerHTML = '';
            
            q.choices.forEach((choice, index) => {
                const btn = document.createElement('button');
                btn.className = 'w-full text-left p-4 border rounded-xl hover:bg-blue-50 hover:border-blue-400 transition mb-2 bg-white';
                btn.innerText = choice;
                btn.onclick = () => answerQuestion(index + 1);
                container.appendChild(btn);
            });

            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 15;
            const timerEl = document.getElementById('timer');
            timerEl.innerText = timeLeft;
            timerEl.classList.remove('timer-warning');

            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 5) timerEl.classList.add('timer-warning');
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    Swal.fire({ title: 'หมดเวลา!', icon: 'warning', timer: 1000, showConfirmButton: false });
                    setTimeout(() => {
                        currentQIndex++;
                        renderQuestion();
                    }, 1000);
                }
            }, 1000);
        }

        function answerQuestion(choiceNum) {
            clearInterval(timerInterval);
            if (choiceNum == questions[currentQIndex].answer) score++;
            currentQIndex++;
            renderQuestion();
        }

        async function finishTest() {
            Swal.fire({ title: 'กำลังบันทึกคะแนน...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            const res = await fetchGAS('saveScore', { name: user.name, phone: user.phone, score: score });
            if (res && res.status === 'success') {
                Swal.close();
                checkUserStatus(); // โหลดอัปเดตสถานะและพาไปหน้า Dashboard/คะแนน
            } else if (res && res.status === 'completed') {
                Swal.fire('แจ้งเตือน', res.message, 'info');
                checkUserStatus();
            } else {
                Swal.fire('แจ้งเตือน', res.message || 'เกิดข้อผิดพลาด', 'warning');
            }
        }

        async function openLeaderboard() {
            const { value: password } = await Swal.fire({
                title: 'รหัสผ่านแอดมิน', input: 'password',
                inputPlaceholder: 'กรอกรหัสผ่านเพื่อดูคะแนน', showCancelButton: true
            });

            if (password) {
                Swal.fire({ title: 'กำลังดึงข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                const res = await fetchGAS('getLeaderboard', { password });
                Swal.close();
                
                if (res && res.status === 'success') {
                    let html = `<div class="space-y-2 mt-4 text-left">`;
                    res.data.forEach((u, i) => {
                        html += `
                        <div class="flex justify-between items-center bg-gray-50 p-3 rounded border">
                            <div>
                                <span class="font-bold text-gray-700">อันดับ ${i+1}</span>
                                <span id="name-${i}" class="ml-2 text-gray-400 blur-sm select-none transition-all duration-300">${u.name}</span>
                            </div>
                            <div class="flex items-center space-x-3">
                                <span class="font-bold text-blue-600">${u.score} คะแนน</span>
                                <button onclick="document.getElementById('name-${i}').classList.remove('blur-sm', 'text-gray-400')" class="text-xs bg-gray-200 px-2 py-1 rounded hover:bg-gray-300">เปิดดู</button>
                            </div>
                        </div>`;
                    });
                    html += `</div>`;
                    
                    Swal.fire({ title: 'Top 5 คะแนนสูงสุด', html: html, width: 500, confirmButtonText: 'ปิด' });
                } else {
                    Swal.fire('ผิดพลาด', 'รหัสผ่านไม่ถูกต้อง', 'error');
                }
            }
        }
    </script>
</body>
</html>
